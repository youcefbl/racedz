<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ZidRun</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center;
        background: #0F766E; color: #fff;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      }
      .box { text-align: center; }
      .mark { width: 72px; height: 72px; margin: 0 auto 16px; }
      .name { font-weight: 900; font-size: 22px; letter-spacing: -0.5px; }
      .hint { margin-top: 8px; font-size: 13px; opacity: 0.75; }
    </style>
  </head>
  <body>
    <div class="box">
      <svg class="mark" viewBox="0 0 40 40" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 11 L16 20 L7 29" stroke="#ffffff" opacity="0.4" />
        <path d="M15 11 L24 20 L15 29" stroke="#ffffff" opacity="0.8" />
        <path d="M23 11 L32 20 L23 29" stroke="#F97316" />
      </svg>
      <div class="name">ZidRun</div>
      <div class="hint">Loading…</div>
    </div>
  </body>
</html>
