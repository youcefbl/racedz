services:
  postgres:
    image: postgres:16-alpine
    container_name: racedz_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-racedz}
      POSTGRES_USER: ${POSTGRES_USER:-racedz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - racedz_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-racedz} -d ${POSTGRES_DB:-racedz}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: racedz-app:latest
    container_name: racedz_app_prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${RACEDZ_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER:-racedz}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-racedz}
    ports:
      - "${APP_PORT:-3003}:3003"
    volumes:
      - racedz_uploads:/app/public/uploads
    command: sh -c "npm run prisma:deploy && npm run start:docker"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3003/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  racedz_postgres_data:
  racedz_uploads:
