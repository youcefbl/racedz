services:
  postgres:
    image: postgres:16-alpine
    container_name: racedz_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-racedz}
      POSTGRES_USER: ${POSTGRES_USER:-racedz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - racedz_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-racedz} -d ${POSTGRES_DB:-racedz}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: racedz-app:latest
    container_name: racedz_app_prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${RACEDZ_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER:-racedz}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-racedz}
    # Not published publicly — Caddy reverse-proxies to it over the internal
    # Docker network. Bound to loopback only so `curl localhost:3003` still
    # works for debugging on the host (Docker port-publishing bypasses ufw,
    # so do NOT bind this to 0.0.0.0).
    ports:
      - "127.0.0.1:${APP_PORT:-3003}:3003"
    volumes:
      - racedz_uploads:/app/public/uploads
    command: sh -c "npm run prisma:deploy && npm run start:docker"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3003/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Scheduler for internal jobs: the daily coach inactivity nudge, the daily "don't forget your run
  # today" training reminder, and a frequent broadcast-dispatch tick that drains any in-flight admin
  # broadcast. All hit the app's CRON_SECRET-guarded internal routes over the Docker network, so the
  # requests never leave the host. Schedules/targets are overridable via env; CRON_SECRET comes from
  # the env file. The broadcast tick is a cheap no-op when nothing is sending; the reminder is a
  # cheap no-op on days no one has a workout scheduled.
  cron:
    image: alpine:3.20
    container_name: racedz_cron_prod
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - ${RACEDZ_ENV_FILE:-.env.production}
    environment:
      TZ: ${CRON_TZ:-UTC}
      NUDGE_SCHEDULE: ${COACH_NUDGE_CRON:-0 17 * * *}
      NUDGE_URL: ${COACH_NUDGE_URL:-http://app:3003/api/internal/cron/inactivity-nudge}
      BROADCAST_SCHEDULE: ${BROADCAST_DISPATCH_CRON:-*/2 * * * *}
      BROADCAST_URL: ${BROADCAST_DISPATCH_URL:-http://app:3003/api/internal/cron/broadcast-dispatch}
      # Default 10:00 in the container's TZ (UTC → 11:00 Africa/Algiers) — a late-morning reminder.
      REMINDER_SCHEDULE: ${TRAINING_REMINDER_CRON:-0 10 * * *}
      REMINDER_URL: ${TRAINING_REMINDER_URL:-http://app:3003/api/internal/cron/training-reminder}
    # `$$` escapes Compose interpolation so the variable is resolved by the in-container shell.
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        apk add --no-cache curl tzdata >/dev/null
        cat > /usr/local/bin/run-nudge <<EOF
        #!/bin/sh
        curl -fsS -X POST -H "Authorization: Bearer $${CRON_SECRET}" "$${NUDGE_URL}" || echo "coach nudge request failed"
        EOF
        cat > /usr/local/bin/run-broadcast <<EOF
        #!/bin/sh
        curl -fsS -X POST -H "Authorization: Bearer $${CRON_SECRET}" "$${BROADCAST_URL}" || echo "broadcast dispatch request failed"
        EOF
        cat > /usr/local/bin/run-reminder <<EOF
        #!/bin/sh
        curl -fsS -X POST -H "Authorization: Bearer $${CRON_SECRET}" "$${REMINDER_URL}" || echo "training reminder request failed"
        EOF
        chmod +x /usr/local/bin/run-nudge /usr/local/bin/run-broadcast /usr/local/bin/run-reminder
        {
          echo "$${NUDGE_SCHEDULE} /usr/local/bin/run-nudge >/proc/1/fd/1 2>/proc/1/fd/2"
          echo "$${BROADCAST_SCHEDULE} /usr/local/bin/run-broadcast >/proc/1/fd/1 2>/proc/1/fd/2"
          echo "$${REMINDER_SCHEDULE} /usr/local/bin/run-reminder >/proc/1/fd/1 2>/proc/1/fd/2"
        } > /etc/crontabs/root
        echo "cron scheduled: nudge [$${NUDGE_SCHEDULE}] broadcast [$${BROADCAST_SCHEDULE}] reminder [$${REMINDER_SCHEDULE}]"
        crond -f -l 8

  caddy:
    image: caddy:2-alpine
    container_name: racedz_caddy_prod
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - racedz_caddy_data:/data
      - racedz_caddy_config:/config
      # Same volume the app writes uploads to — Caddy serves /uploads/* directly
      # (read-only) because `next start` doesn't serve runtime-written public files.
      - racedz_uploads:/srv/uploads:ro

volumes:
  racedz_postgres_data:
  racedz_uploads:
  racedz_caddy_data:
  racedz_caddy_config:
