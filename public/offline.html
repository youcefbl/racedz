<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ZidRun — Offline</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center; padding: 24px;
        background: #0F766E; color: #fff; text-align: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      }
      .mark { width: 64px; height: 64px; margin: 0 auto 18px; }
      h1 { font-size: 22px; font-weight: 900; margin: 0 0 8px; }
      p { margin: 0 0 22px; opacity: 0.85; line-height: 1.5; max-width: 22rem; }
      button {
        appearance: none; border: 0; cursor: pointer;
        background: #F97316; color: #fff; font-weight: 800; font-size: 15px;
        padding: 12px 22px; border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div>
      <svg class="mark" viewBox="0 0 40 40" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 11 L16 20 L7 29" stroke="#ffffff" opacity="0.4" />
        <path d="M15 11 L24 20 L15 29" stroke="#ffffff" opacity="0.8" />
        <path d="M23 11 L32 20 L23 29" stroke="#F97316" />
      </svg>
      <h1>You're offline</h1>
      <p>ZidRun needs a connection to load this page. Any run you recorded is saved on your device and will upload when you're back online.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
